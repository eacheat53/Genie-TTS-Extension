<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Genie TTS 设置</title>
    <style>
        body { width: 250px; padding: 15px; font-family: sans-serif; }
        h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; margin-top: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .value-display { font-weight: bold; color: #0066cc; }
    </style>
</head>
<body>
    <h3>Genie TTS 控制台</h3>
    <div class="control-group">
        <label for="charInput">角色名称 (需后端已加载):</label>
        <input type="text" id="charInput" value="feibi" style="width: 150px; padding: 5px; margin-top: 5px;">
    </div>
    <div class="control-group">
        <label for="speedInput">播放语速 (倍数):</label>
        <input type="number" id="speedInput" min="0.1" max="5.0" step="0.1" value="1.0" style="width: 80px; padding: 5px; margin-top: 5px;">
    </div>
    <script src="popup.js"></script>
</body>
</html>
